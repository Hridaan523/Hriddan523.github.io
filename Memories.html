<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Our Memories 📸</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff0f5;
      color: #333;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #ff69b4;
      color: white;
      padding: 30px 20px;
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
    }
    section {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
    }
    .gallery img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    footer {
      background: #ff69b4;
      color: white;
      padding: 20px;
      font-size: 1.1em;
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
    }
    body {
      padding-bottom: 60px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Our Special Memories 📸</h1>
  </header>

  <section>
    <div class="gallery">
    
      <img src="https://raw.githubusercontent.com/Hridaan523/Hriddan523.github.io/main/IMG-20251229-WA0002.jpg" alt="Memories 1" />
      <img src="https://raw.githubusercontent.com/Hridaan523/Hriddan523.github.io/main/img_1_1781322281204.jpg" alt="Memories 2" />
      <img src="https://raw.githubusercontent.com/Hridaan523/Hriddan523.github.io/main/img_1_1781322101148.jpg" alt="Memories 3" />
      <img src="https://raw.githubusercontent.com/Hridaan523/Hriddan523.github.io/main/IMG_20250226_190956.jpg" alt="Memories 4" />
        </div>
  </section>

  <footer>
    By Subhojit ❤️
  </footer>
</body>
</html>
